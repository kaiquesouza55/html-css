<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }
    
    div>p{
        display: none;
    }

    div:hover > p {
        display:block;
        color:rgb(1, 1, 1);
        background-color: rgb(43, 80, 226);
        height: 20px;
        width: 200px;
    }

    

    div:hover{
        color: rgb(186, 57, 57);
    }
</style>
</head>

<body>
   <h1>Exemplo de hover</h1> 
   <p>Pass e o mouse sobre o texto abaixo</p> 
   <div>
    passe o mouse aqui
    <p>TEXTO ESCONDIDO......</p>
   </div>
   <p>fim do exemplo</p>
</body>
</html>
